name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: Build Linux
        run: |
          go mod tidy
          go build -o dist/tesselbox-linux ./cmd/main.go
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false
      - name: Build Windows
        run: go build -o dist/tesselbox-windows.exe ./cmd/main.go
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false
      - name: Build macOS
        run: |
          go mod tidy
          go build -o dist/tesselbox-macos ./cmd/main.go
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/*

