name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev
    
    - name: Build Linux AMD64
      run: |
        go build -ldflags="-s -w" -o dist/tesselbox-linux-amd64 ./cmd/main.go
    
    - name: Build Linux ARM64
      run: |
        GOARCH=arm64 go build -ldflags="-s -w" -o dist/tesselbox-linux-arm64 ./cmd/main.go
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-builds
        path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build Windows AMD64
      run: |
        go build -ldflags="-s -w" -o dist/tesselbox-windows-amd64.exe ./cmd/main.go
    
    - name: Build Windows ARM64
      run: |
        set GOARCH=arm64
        go build -ldflags="-s -w" -o dist/tesselbox-windows-arm64.exe ./cmd/main.go
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-builds
        path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build macOS AMD64
      run: |
        GOARCH=amd64 go build -ldflags="-s -w" -o dist/tesselbox-darwin-amd64 ./cmd/main.go
    
    - name: Build macOS ARM64 (Apple Silicon)
      run: |
        GOARCH=arm64 go build -ldflags="-s -w" -o dist/tesselbox-darwin-arm64 ./cmd/main.go
    
    - name: Create Universal Binary
      run: |
        lipo -create -output dist/tesselbox-darwin-universal dist/tesselbox-darwin-amd64 dist/tesselbox-darwin-arm64 || true
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-builds
        path: dist/*

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install NDK
      run: |
        sdkmanager "ndk;25.2.9519653"
    
    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        gomobile init
    
    - name: Build Android APK
      env:
        ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
      run: |
        gomobile build -target=android -o dist/tesselbox.apk ./cmd/main.go
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build
        path: dist/*

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        gomobile init
    
    - name: Build iOS
      run: |
        gomobile build -target=ios -o dist/TesselBox.app ./cmd/main.go
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: dist/*

  # Release job disabled - only builds artifacts for now
