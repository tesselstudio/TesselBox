<!DOCTYPE html>
<html>
	<head>
		<style>
			body {
				padding: 0;
				margin: 0;
				font-family: "Material Icons", sans-serif;
				pointer-events: none;
			}
			#hudScreen {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				z-index: 100;
				pointer-events: none;
			}
			/* Health and Hunger Bars - Top Left */
			#statusPanel {
				position: absolute;
				top: 20px;
				left: 20px;
				display: flex;
				flex-direction: column;
				gap: 8px;
			}
			.bar-container {
				display: flex;
				align-items: center;
				gap: 8px;
			}
			.bar-icon {
				width: 20px;
				height: 20px;
				font-size: 16px;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.bar {
				width: 120px;
				height: 12px;
				background: rgba(0, 0, 0, 0.5);
				border-radius: 6px;
				overflow: hidden;
				border: 1px solid rgba(255, 255, 255, 0.2);
			}
			.bar-fill {
				height: 100%;
				border-radius: 5px;
				transition: width 0.3s ease;
			}
			#healthBar .bar-fill {
				background: linear-gradient(90deg, #ff4757 0%, #ff6b81 100%);
			}
			#hungerBar .bar-fill {
				background: linear-gradient(90deg, #e67e22 0%, #f39c12 100%);
			}
			#staminaBar .bar-fill {
				background: linear-gradient(90deg, #3498db 0%, #5dade2 100%);
			}
			/* XP Bar - Top Center */
			#xpPanel {
				position: absolute;
				top: 20px;
				left: 50%;
				transform: translateX(-50%);
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 4px;
			}
			#xpBar {
				width: 300px;
				height: 8px;
				background: rgba(0, 0, 0, 0.5);
				border-radius: 4px;
				overflow: hidden;
				border: 1px solid rgba(255, 255, 255, 0.2);
			}
			#xpFill {
				width: 45%;
				height: 100%;
				background: linear-gradient(90deg, #9b59b6 0%, #bb8fce 100%);
				transition: width 0.3s ease;
			}
			#xpText {
				font-size: 12px;
				color: rgba(255, 255, 255, 0.8);
			}
			#levelBadge {
				position: absolute;
				top: -10px;
				background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
				padding: 4px 12px;
				border-radius: 10px;
				font-size: 12px;
				font-weight: bold;
				color: white;
				border: 2px solid rgba(255, 255, 255, 0.3);
			}
			/* Crosshair - Center */
			#crosshair {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				width: 16px;
				height: 16px;
				opacity: 0.8;
			}
			#crosshair::before,
			#crosshair::after {
				content: '';
				position: absolute;
				background: white;
				box-shadow: 0 0 2px rgba(0, 0, 0, 0.8);
			}
			#crosshair::before {
				width: 2px;
				height: 12px;
				top: 2px;
				left: 50%;
				transform: translateX(-50%);
			}
			#crosshair::after {
				width: 12px;
				height: 2px;
				left: 2px;
				top: 50%;
				transform: translateY(-50%);
			}
			/* Hotbar - Bottom Center */
			#hotbarPanel {
				position: absolute;
				bottom: 20px;
				left: 50%;
				transform: translateX(-50%);
				display: flex;
				gap: 4px;
				padding: 6px;
				background: rgba(0, 0, 0, 0.5);
				border-radius: 8px;
				border: 1px solid rgba(255, 255, 255, 0.2);
			}
			.hotbar-slot {
				width: 48px;
				height: 48px;
				background: rgba(255, 255, 255, 0.1);
				border: 2px solid rgba(255, 255, 255, 0.2);
				border-radius: 4px;
				display: flex;
				align-items: center;
				justify-content: center;
				position: relative;
				transition: all 0.2s ease;
			}
			.hotbar-slot.active {
				border-color: white;
				box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
				background: rgba(255, 255, 255, 0.2);
			}
			.hotbar-slot .item-count {
				position: absolute;
				bottom: 2px;
				right: 4px;
				font-size: 12px;
				font-weight: bold;
				color: white;
				text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
			}
			.hotbar-slot .slot-number {
				position: absolute;
				top: 2px;
				left: 4px;
				font-size: 10px;
				color: rgba(255, 255, 255, 0.5);
			}
			/* Debug Info - Top Right */
			#debugPanel {
				position: absolute;
				top: 20px;
				right: 20px;
				background: rgba(0, 0, 0, 0.5);
				padding: 12px 16px;
				border-radius: 8px;
				font-size: 12px;
				color: rgba(255, 255, 255, 0.8);
				font-family: monospace;
				line-height: 1.5;
				display: none;
			}
			#debugPanel.visible {
				display: block;
			}
			.debug-row {
				display: flex;
				justify-content: space-between;
				gap: 20px;
			}
			.debug-label {
				color: rgba(255, 255, 255, 0.5);
			}
			/* Block Info - Center Bottom (above hotbar) */
			#blockInfo {
				position: absolute;
				bottom: 90px;
				left: 50%;
				transform: translateX(-50%);
				background: rgba(0, 0, 0, 0.5);
				padding: 8px 16px;
				border-radius: 8px;
				font-size: 14px;
				color: white;
				opacity: 0;
				transition: opacity 0.3s ease;
			}
			#blockInfo.visible {
				opacity: 1;
			}
			/* Action Bar - Messages */
			#actionBar {
				position: absolute;
				top: 60%;
				left: 50%;
				transform: translateX(-50%);
				font-size: 18px;
				color: white;
				text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
				opacity: 0;
				transition: opacity 0.5s ease;
				text-align: center;
			}
			#actionBar.visible {
				opacity: 1;
			}
			/* Tool durability indicator */
			#durabilityBar {
				position: absolute;
				bottom: 85px;
				left: 50%;
				transform: translateX(-50%);
				width: 100px;
				height: 4px;
				background: rgba(0, 0, 0, 0.5);
				border-radius: 2px;
				overflow: hidden;
				display: none;
			}
			#durabilityBar.visible {
				display: block;
			}
			#durabilityFill {
				width: 100%;
				height: 100%;
				background: linear-gradient(90deg, #27ae60 0%, #2ecc71 100%);
				transition: width 0.3s ease;
			}
		</style>
	</head>
	<body>
		<div id="hudScreen">
			<!-- Status Bars (Health, Hunger, Stamina) -->
			<div id="statusPanel">
				<div class="bar-container" id="healthContainer">
					<div class="bar-icon">❤️</div>
					<div class="bar" id="healthBar">
						<div class="bar-fill" id="healthFill" style="width: 100%;"></div>
					</div>
				</div>
				<div class="bar-container" id="hungerContainer">
					<div class="bar-icon">🍖</div>
					<div class="bar" id="hungerBar">
						<div class="bar-fill" id="hungerFill" style="width: 80%;"></div>
					</div>
				</div>
				<div class="bar-container" id="staminaContainer">
					<div class="bar-icon">⚡</div>
					<div class="bar" id="staminaBar">
						<div class="bar-fill" id="staminaFill" style="width: 100%;"></div>
					</div>
				</div>
			</div>
			
			<!-- XP Bar -->
			<div id="xpPanel">
				<div id="levelBadge">LVL 1</div>
				<div id="xpBar">
					<div id="xpFill"></div>
				</div>
				<div id="xpText">XP: 450 / 1000</div>
			</div>
			
			<!-- Crosshair -->
			<div id="crosshair"></div>
			
			<!-- Hotbar -->
			<div id="hotbarPanel">
				<div class="hotbar-slot active" data-slot="0">
					<span class="slot-number">1</span>
				</div>
				<div class="hotbar-slot" data-slot="1">
					<span class="slot-number">2</span>
				</div>
				<div class="hotbar-slot" data-slot="2">
					<span class="slot-number">3</span>
				</div>
				<div class="hotbar-slot" data-slot="3">
					<span class="slot-number">4</span>
				</div>
				<div class="hotbar-slot" data-slot="4">
					<span class="slot-number">5</span>
				</div>
				<div class="hotbar-slot" data-slot="5">
					<span class="slot-number">6</span>
				</div>
				<div class="hotbar-slot" data-slot="6">
					<span class="slot-number">7</span>
				</div>
				<div class="hotbar-slot" data-slot="7">
					<span class="slot-number">8</span>
				</div>
				<div class="hotbar-slot" data-slot="8">
					<span class="slot-number">9</span>
				</div>
			</div>
			
			<!-- Durability Indicator -->
			<div id="durabilityBar">
				<div id="durabilityFill"></div>
			</div>
			
			<!-- Block Info -->
			<div id="blockInfo">
				<span id="blockName">Grass Block</span>
			</div>
			
			<!-- Action Bar -->
			<div id="actionBar">
				<span id="actionMessage">Press E to open inventory</span>
			</div>
			
			<!-- Debug Info -->
			<div id="debugPanel">
				<div class="debug-row"><span class="debug-label">FPS:</span><span id="debugFps">60</span></div>
				<div class="debug-row"><span class="debug-label">XYZ:</span><span id="debugPos">0, 64, 0</span></div>
				<div class="debug-row"><span class="debug-label">Chunk:</span><span id="debugChunk">0, 0</span></div>
				<div class="debug-row"><span class="debug-label">Facing:</span><span id="debugFacing">South</span></div>
				<div class="debug-row"><span class="debug-label">Time:</span><span id="debugTime">12:00</span></div>
				<div class="debug-row"><span class="debug-label">Entities:</span><span id="debugEntities">0</span></div>
			</div>
		</div>
	</body>
</html>
