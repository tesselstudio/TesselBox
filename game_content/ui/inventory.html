<!DOCTYPE html>
<html>
	<head>
		<style>
			@keyframes fadeIn {
				from { opacity: 0; }
				to { opacity: 1; }
			}
			@keyframes slideUp {
				from { opacity: 0; transform: translateY(20px); }
				to { opacity: 1; transform: translateY(0); }
			}
			body {
				padding: 0;
				margin: 0;
				font-family: "Material Icons", sans-serif;
			}
			#inventoryScreen {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.7);
				display: flex;
				justify-content: center;
				align-items: center;
				z-index: 1500;
				animation: fadeIn 0.2s ease-out;
			}
			#inventoryContainer {
				display: flex;
				gap: 20px;
				animation: slideUp 0.3s ease-out;
			}
			/* Main Inventory Panel */
			.inventory-panel {
				width: 380px;
				padding: 25px;
				background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
				border: 1px solid rgba(255, 255, 255, 0.3);
				border-radius: 16px;
				backdrop-filter: blur(20px);
			}
			.panel-title {
				font-size: 20px;
				color: white;
				font-weight: bold;
				margin-bottom: 20px;
				letter-spacing: 1px;
			}
			/* Inventory Grid */
			.inventory-grid {
				display: grid;
				grid-template-columns: repeat(9, 1fr);
				gap: 6px;
				margin-bottom: 20px;
			}
			.inventory-slot {
				width: 38px;
				height: 38px;
				background: rgba(0, 0, 0, 0.3);
				border: 1px solid rgba(255, 255, 255, 0.15);
				border-radius: 6px;
				display: flex;
				align-items: center;
				justify-content: center;
				position: relative;
				cursor: pointer;
				transition: all 0.2s ease;
			}
			.inventory-slot:hover {
				background: rgba(255, 255, 255, 0.1);
				border-color: rgba(255, 255, 255, 0.3);
			}
			.inventory-slot.selected {
				border-color: #e94560;
				background: rgba(233, 69, 96, 0.2);
				box-shadow: 0 0 8px rgba(233, 69, 96, 0.5);
			}
			.inventory-slot .item-count {
				position: absolute;
				bottom: 2px;
				right: 3px;
				font-size: 10px;
				font-weight: bold;
				color: white;
				text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
			}
			.inventory-slot .item-durability {
				position: absolute;
				bottom: 0;
				left: 2px;
				right: 2px;
				height: 2px;
				background: rgba(0, 0, 0, 0.5);
				border-radius: 1px;
				overflow: hidden;
			}
			.inventory-slot .item-durability-fill {
				height: 100%;
				background: #2ecc71;
			}
			/* Hotbar Section */
			.hotbar-section {
				padding-top: 15px;
				border-top: 1px solid rgba(255, 255, 255, 0.2);
			}
			.hotbar-grid {
				display: grid;
				grid-template-columns: repeat(9, 1fr);
				gap: 6px;
			}
			.hotbar-grid .inventory-slot {
				background: rgba(0, 0, 0, 0.4);
				border-color: rgba(255, 255, 255, 0.2);
			}
			.hotbar-grid .inventory-slot.active {
				border-color: white;
				box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
			}
			/* Armor Section */
			.armor-section {
				margin-bottom: 20px;
			}
			.armor-grid {
				display: grid;
				grid-template-columns: repeat(4, 1fr);
				gap: 6px;
			}
			.armor-grid .inventory-slot {
				background: rgba(0, 0, 0, 0.3);
			}
			.armor-label {
				font-size: 11px;
				color: rgba(255, 255, 255, 0.5);
				margin-bottom: 8px;
				text-transform: uppercase;
				letter-spacing: 1px;
			}
			/* Player Preview */
			#playerPreview {
				width: 120px;
				height: 200px;
				background: rgba(0, 0, 0, 0.3);
				border: 1px solid rgba(255, 255, 255, 0.2);
				border-radius: 12px;
				margin: 0 auto 20px;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 60px;
			}
			/* Tooltip */
			#tooltip {
				position: fixed;
				background: rgba(0, 0, 0, 0.9);
				border: 1px solid rgba(255, 255, 255, 0.3);
				border-radius: 8px;
				padding: 12px 16px;
				pointer-events: none;
				z-index: 2000;
				display: none;
				max-width: 250px;
			}
			#tooltip.visible {
				display: block;
			}
			.tooltip-name {
				font-size: 14px;
				font-weight: bold;
				color: white;
				margin-bottom: 4px;
			}
			.tooltip-description {
				font-size: 12px;
				color: rgba(255, 255, 255, 0.6);
				margin-bottom: 8px;
			}
			.tooltip-stats {
				font-size: 11px;
				color: rgba(255, 255, 255, 0.5);
			}
			/* Item Details Panel */
			#itemDetailsPanel {
				width: 200px;
				padding: 20px;
				background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
				border: 1px solid rgba(255, 255, 255, 0.2);
				border-radius: 12px;
				backdrop-filter: blur(15px);
			}
			#selectedItemIcon {
				width: 60px;
				height: 60px;
				background: rgba(0, 0, 0, 0.3);
				border-radius: 8px;
				margin: 0 auto 15px;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 30px;
			}
			#selectedItemName {
				font-size: 16px;
				font-weight: bold;
				color: white;
				text-align: center;
				margin-bottom: 8px;
			}
			#selectedItemType {
				font-size: 11px;
				color: rgba(255, 255, 255, 0.5);
				text-align: center;
				text-transform: uppercase;
				letter-spacing: 1px;
				margin-bottom: 15px;
			}
			.stat-row {
				display: flex;
				justify-content: space-between;
				padding: 6px 0;
				border-bottom: 1px solid rgba(255, 255, 255, 0.1);
				font-size: 12px;
			}
			.stat-row:last-child {
				border-bottom: none;
			}
			.stat-label {
				color: rgba(255, 255, 255, 0.5);
			}
			.stat-value {
				color: white;
				font-weight: 500;
			}
			/* Close hint */
			#closeHint {
				position: absolute;
				bottom: 20px;
				left: 50%;
				transform: translateX(-50%);
				font-size: 12px;
				color: rgba(255, 255, 255, 0.5);
			}
		</style>
	</head>
	<body>
		<div id="inventoryScreen">
			<div id="inventoryContainer">
				<!-- Main Inventory -->
				<div class="inventory-panel">
					<div class="panel-title">Inventory</div>
					
					<!-- Armor Section -->
					<div class="armor-section">
						<div class="armor-label">Armor</div>
						<div class="armor-grid">
							<div class="inventory-slot" data-slot="helmet" data-type="armor">
								<span>🪖</span>
							</div>
							<div class="inventory-slot" data-slot="chestplate" data-type="armor">
								<span>👕</span>
							</div>
							<div class="inventory-slot" data-slot="leggings" data-type="armor">
								<span>👖</span>
							</div>
							<div class="inventory-slot" data-slot="boots" data-type="armor">
								<span>👢</span>
							</div>
						</div>
					</div>
					
					<!-- Player Preview -->
					<div id="playerPreview">🧍</div>
					
					<!-- Main Inventory Grid -->
					<div class="inventory-grid" id="mainInventory">
						<!-- 36 slots -->
						<div class="inventory-slot" data-index="0"></div>
						<div class="inventory-slot" data-index="1"></div>
						<div class="inventory-slot" data-index="2"></div>
						<div class="inventory-slot" data-index="3"></div>
						<div class="inventory-slot" data-index="4"></div>
						<div class="inventory-slot" data-index="5"></div>
						<div class="inventory-slot" data-index="6"></div>
						<div class="inventory-slot" data-index="7"></div>
						<div class="inventory-slot" data-index="8"></div>
						<div class="inventory-slot" data-index="9"></div>
						<div class="inventory-slot" data-index="10"></div>
						<div class="inventory-slot" data-index="11"></div>
						<div class="inventory-slot" data-index="12"></div>
						<div class="inventory-slot" data-index="13"></div>
						<div class="inventory-slot" data-index="14"></div>
						<div class="inventory-slot" data-index="15"></div>
						<div class="inventory-slot" data-index="16"></div>
						<div class="inventory-slot" data-index="17"></div>
						<div class="inventory-slot" data-index="18"></div>
						<div class="inventory-slot" data-index="19"></div>
						<div class="inventory-slot" data-index="20"></div>
						<div class="inventory-slot" data-index="21"></div>
						<div class="inventory-slot" data-index="22"></div>
						<div class="inventory-slot" data-index="23"></div>
						<div class="inventory-slot" data-index="24"></div>
						<div class="inventory-slot" data-index="25"></div>
						<div class="inventory-slot" data-index="26"></div>
						<div class="inventory-slot" data-index="27"></div>
						<div class="inventory-slot" data-index="28"></div>
						<div class="inventory-slot" data-index="29"></div>
						<div class="inventory-slot" data-index="30"></div>
						<div class="inventory-slot" data-index="31"></div>
						<div class="inventory-slot" data-index="32"></div>
						<div class="inventory-slot" data-index="33"></div>
						<div class="inventory-slot" data-index="34"></div>
						<div class="inventory-slot" data-index="35"></div>
					</div>
					
					<!-- Hotbar -->
					<div class="hotbar-section">
						<div class="hotbar-grid" id="hotbarInventory">
							<div class="inventory-slot active" data-hotbar="0"></div>
							<div class="inventory-slot" data-hotbar="1"></div>
							<div class="inventory-slot" data-hotbar="2"></div>
							<div class="inventory-slot" data-hotbar="3"></div>
							<div class="inventory-slot" data-hotbar="4"></div>
							<div class="inventory-slot" data-hotbar="5"></div>
							<div class="inventory-slot" data-hotbar="6"></div>
							<div class="inventory-slot" data-hotbar="7"></div>
							<div class="inventory-slot" data-hotbar="8"></div>
						</div>
					</div>
				</div>
				
				<!-- Item Details -->
				<div id="itemDetailsPanel">
					<div id="selectedItemIcon">📦</div>
					<div id="selectedItemName">Select an item</div>
					<div id="selectedItemType">-</div>
					
					<div class="stat-row">
						<span class="stat-label">Damage</span>
						<span class="stat-value" id="statDamage">-</span>
					</div>
					<div class="stat-row">
						<span class="stat-label">Durability</span>
						<span class="stat-value" id="statDurability">-</span>
					</div>
					<div class="stat-row">
						<span class="stat-label">Speed</span>
						<span class="stat-value" id="statSpeed">-</span>
					</div>
					<div class="stat-row">
						<span class="stat-label">Armor</span>
						<span class="stat-value" id="statArmor">-</span>
					</div>
				</div>
			</div>
			
			<div id="closeHint">Press E to close inventory</div>
		</div>
		
		<!-- Tooltip -->
		<div id="tooltip">
			<div class="tooltip-name">Item Name</div>
			<div class="tooltip-description">Item description goes here</div>
			<div class="tooltip-stats">Attack: 5 | Durability: 100</div>
		</div>
	</body>
</html>
