<!DOCTYPE html>
<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .crafting-container {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.95), rgba(20, 20, 30, 0.98));
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 30px;
            min-width: 500px;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .crafting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .crafting-title {
            font-size: 24px;
            font-weight: bold;
            color: #f0f0f0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .close-btn {
            background: rgba(255, 80, 80, 0.8);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 100, 100, 1);
            transform: scale(1.05);
        }

        .crafting-area {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 30px;
            align-items: start;
            margin-bottom: 20px;
        }

        .grid-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .crafting-grid {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .grid-slot {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }

        .grid-slot:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .grid-slot.has-item {
            background: rgba(100, 150, 255, 0.2);
            border-color: rgba(100, 150, 255, 0.5);
        }

        .arrow-section {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 30px;
        }

        .crafting-arrow {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.5);
            text-shadow: 0 0 10px rgba(100, 200, 100, 0.5);
        }

        .result-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .result-slot {
            width: 70px;
            height: 70px;
            background: rgba(100, 200, 100, 0.1);
            border: 3px solid rgba(100, 200, 100, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            margin-top: 30px;
        }

        .result-slot:hover {
            background: rgba(100, 200, 100, 0.2);
            border-color: rgba(100, 200, 100, 0.6);
        }

        .result-slot.has-result {
            background: rgba(100, 200, 100, 0.3);
            border-color: rgba(100, 200, 100, 0.8);
            box-shadow: 0 0 20px rgba(100, 200, 100, 0.4);
        }

        .item-icon {
            width: 40px;
            height: 40px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        .craft-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, rgba(80, 200, 80, 0.8), rgba(60, 160, 60, 0.9));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .craft-btn:hover {
            background: linear-gradient(135deg, rgba(100, 220, 100, 0.9), rgba(80, 180, 80, 1));
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(80, 200, 80, 0.4);
        }

        .craft-btn:disabled {
            background: rgba(100, 100, 100, 0.5);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .recipe-list {
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            padding: 10px;
        }

        .recipe-list::-webkit-scrollbar {
            width: 8px;
        }

        .recipe-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .recipe-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        .recipe-item {
            padding: 8px 12px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .recipe-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .recipe-item.selected {
            background: rgba(100, 150, 255, 0.3);
            border-left: 3px solid rgba(100, 150, 255, 0.8);
        }

        .recipe-name {
            flex-grow: 1;
        }

        .recipe-result {
            color: rgba(100, 255, 100, 0.9);
            font-weight: bold;
        }

        .inventory-section {
            margin-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(9, 45px);
            gap: 4px;
            justify-content: center;
        }

        .inv-slot {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }

        .inv-slot:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .inv-slot.hotbar {
            border-color: rgba(255, 200, 100, 0.5);
        }

        .inv-slot.selected {
            border-color: rgba(100, 200, 255, 0.8);
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.3);
        }

        .inv-slot .item-icon {
            width: 35px;
            height: 35px;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            display: none;
            max-width: 200px;
        }

        .tooltip.show {
            display: block;
        }

        .tooltip-title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 4px;
        }

        .tooltip-desc {
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <div class="crafting-container">
        <div class="crafting-header">
            <h1 class="crafting-title">Crafting</h1>
            <button class="close-btn" id="closeBtn">X</button>
        </div>

        <div class="crafting-area">
            <div class="grid-section">
                <div class="section-label">Crafting Grid</div>
                <div class="crafting-grid" id="craftingGrid">
                    <div class="grid-slot" data-slot="0"></div>
                    <div class="grid-slot" data-slot="1"></div>
                    <div class="grid-slot" data-slot="2"></div>
                    <div class="grid-slot" data-slot="3"></div>
                    <div class="grid-slot" data-slot="4"></div>
                    <div class="grid-slot" data-slot="5"></div>
                    <div class="grid-slot" data-slot="6"></div>
                    <div class="grid-slot" data-slot="7"></div>
                    <div class="grid-slot" data-slot="8"></div>
                </div>
            </div>

            <div class="arrow-section">
                <span class="crafting-arrow">&#10142;</span>
            </div>

            <div class="result-section">
                <div class="section-label">Result</div>
                <div class="result-slot" id="resultSlot"></div>
            </div>
        </div>

        <button class="craft-btn" id="craftBtn" disabled>Craft Item</button>

        <div class="section-label">Available Recipes</div>
        <div class="recipe-list" id="recipeList">
            <div class="recipe-item" data-recipe="wooden_pickaxe">
                <span class="recipe-name">Wooden Pickaxe</span>
                <span class="recipe-result">3 Wood + 2 Wood</span>
            </div>
            <div class="recipe-item" data-recipe="stone_pickaxe">
                <span class="recipe-name">Stone Pickaxe</span>
                <span class="recipe-result">3 Stone + 2 Wood</span>
            </div>
            <div class="recipe-item" data-recipe="wooden_sword">
                <span class="recipe-name">Wooden Sword</span>
                <span class="recipe-result">2 Wood + 1 Wood</span>
            </div>
            <div class="recipe-item" data-recipe="wood_planks">
                <span class="recipe-name">Wood Planks</span>
                <span class="recipe-result">1 Wood &#8594; 4</span>
            </div>
        </div>

        <div class="inventory-section">
            <div class="section-label">Inventory (Click items to add to grid)</div>
            <div class="inventory-grid" id="inventoryGrid">
                <!-- 36 slots generated by code -->
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip">
        <div class="tooltip-title" id="tooltipTitle"></div>
        <div class="tooltip-desc" id="tooltipDesc"></div>
    </div>

    <script>
        // State
        let craftingGrid = Array(9).fill(null);
        let inventory = Array(36).fill(null);
        let selectedRecipe = null;
        let draggedItem = null;
        let draggedFrom = null;

        // DOM Elements
        const craftingGridEl = document.getElementById('craftingGrid');
        const resultSlotEl = document.getElementById('resultSlot');
        const craftBtn = document.getElementById('craftBtn');
        const closeBtn = document.getElementById('closeBtn');
        const recipeListEl = document.getElementById('recipeList');
        const inventoryGridEl = document.getElementById('inventoryGrid');
        const tooltip = document.getElementById('tooltip');

        // Initialize inventory grid
        function initInventoryGrid() {
            inventoryGridEl.innerHTML = '';
            for (let i = 0; i < 36; i++) {
                const slot = document.createElement('div');
                slot.className = 'inv-slot' + (i < 9 ? ' hotbar' : '');
                slot.dataset.slot = i;
                inventoryGridEl.appendChild(slot);
            }
        }

        // Update crafting grid display
        function updateCraftingGrid() {
            const slots = craftingGridEl.querySelectorAll('.grid-slot');
            slots.forEach((slot, index) => {
                const item = craftingGrid[index];
                if (item) {
                    slot.innerHTML = `
                        <div class="item-icon" style="background-color: ${item.color || '#888'}"></div>
                        <span class="item-count">${item.count}</span>
                    `;
                    slot.classList.add('has-item');
                } else {
                    slot.innerHTML = '';
                    slot.classList.remove('has-item');
                }
            });
        }

        // Update inventory display
        function updateInventory() {
            const slots = inventoryGridEl.querySelectorAll('.inv-slot');
            slots.forEach((slot, index) => {
                const item = inventory[index];
                if (item) {
                    slot.innerHTML = `
                        <div class="item-icon" style="background-color: ${item.color || '#888'}"></div>
                        <span class="item-count">${item.count}</span>
                    `;
                } else {
                    slot.innerHTML = '';
                }
            });
        }

        // Check if a recipe can be crafted
        function checkRecipe() {
            // This would check against server-side recipes
            // For now, enable craft button if grid has items
            const hasItems = craftingGrid.some(item => item !== null);
            craftBtn.disabled = !hasItems;
        }

        // Craft button click
        craftBtn.addEventListener('click', () => {
            if (!craftBtn.disabled) {
                // Send craft request to game
                window.craftingCraft && window.craftingCraft(craftingGrid);
            }
        });

        // Close button click
        closeBtn.addEventListener('click', () => {
            window.craftingClose && window.craftingClose();
        });

        // Recipe selection
        recipeListEl.addEventListener('click', (e) => {
            const recipeItem = e.target.closest('.recipe-item');
            if (recipeItem) {
                document.querySelectorAll('.recipe-item').forEach(r => r.classList.remove('selected'));
                recipeItem.classList.add('selected');
                selectedRecipe = recipeItem.dataset.recipe;
            }
        });

        // Grid slot clicks
        craftingGridEl.addEventListener('click', (e) => {
            const slot = e.target.closest('.grid-slot');
            if (slot) {
                const index = parseInt(slot.dataset.slot);
                if (draggedItem && draggedFrom !== null) {
                    // Place item from inventory
                    craftingGrid[index] = draggedItem;
                    inventory[draggedFrom] = null;
                    draggedItem = null;
                    draggedFrom = null;
                    updateCraftingGrid();
                    updateInventory();
                    checkRecipe();
                } else if (craftingGrid[index]) {
                    // Remove item from grid
                    const item = craftingGrid[index];
                    // Try to return to inventory
                    const emptySlot = inventory.findIndex(i => i === null);
                    if (emptySlot !== -1) {
                        inventory[emptySlot] = item;
                    }
                    craftingGrid[index] = null;
                    updateCraftingGrid();
                    updateInventory();
                    checkRecipe();
                }
            }
        });

        // Inventory slot clicks
        inventoryGridEl.addEventListener('click', (e) => {
            const slot = e.target.closest('.inv-slot');
            if (slot) {
                const index = parseInt(slot.dataset.slot);
                const item = inventory[index];
                if (item && !draggedItem) {
                    draggedItem = item;
                    draggedFrom = index;
                    // Visual feedback
                    slot.style.opacity = '0.5';
                } else if (draggedItem && draggedFrom !== null) {
                    // Swap items
                    const temp = inventory[index];
                    inventory[index] = draggedItem;
                    inventory[draggedFrom] = temp;
                    draggedItem = null;
                    draggedFrom = null;
                    updateInventory();
                    // Reset opacity
                    document.querySelectorAll('.inv-slot').forEach(s => s.style.opacity = '');
                }
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.craftingClose && window.craftingClose();
            }
            if (e.key === 'c' || e.key === 'C') {
                // Clear crafting grid
                craftingGrid.forEach((item, i) => {
                    if (item) {
                        const emptySlot = inventory.findIndex(inv => inv === null);
                        if (emptySlot !== -1) {
                            inventory[emptySlot] = item;
                        }
                    }
                });
                craftingGrid.fill(null);
                updateCraftingGrid();
                updateInventory();
                checkRecipe();
            }
        });

        // Tooltip handling
        function showTooltip(e, title, desc) {
            document.getElementById('tooltipTitle').textContent = title;
            document.getElementById('tooltipDesc').textContent = desc;
            tooltip.classList.add('show');
            tooltip.style.left = e.pageX + 10 + 'px';
            tooltip.style.top = e.pageY + 10 + 'px';
        }

        function hideTooltip() {
            tooltip.classList.remove('show');
        }

        // Initialize
        initInventoryGrid();
        updateCraftingGrid();
        updateInventory();
        checkRecipe();

        // Expose functions for game integration
        window.setInventoryData = function(invData) {
            inventory = invData;
            updateInventory();
        };

        window.setCraftingResult = function(result) {
            if (result) {
                resultSlotEl.innerHTML = `
                    <div class="item-icon" style="background-color: ${result.color || '#8f8'}"></div>
                    <span class="item-count">${result.count}</span>
                `;
                resultSlotEl.classList.add('has-result');
            } else {
                resultSlotEl.innerHTML = '';
                resultSlotEl.classList.remove('has-result');
            }
        };

        window.clearCraftingGrid = function() {
            craftingGrid.fill(null);
            updateCraftingGrid();
            checkRecipe();
        };
    </script>
</body>
</html>
