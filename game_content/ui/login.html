<!DOCTYPE html>
<html>
	<head>
		<style>
			@keyframes gradientShift {
				0% { background-position: 0% 50%; }
				50% { background-position: 100% 50%; }
				100% { background-position: 0% 50%; }
			}
			@keyframes float {
				0%, 100% { transform: translateY(0px) rotate(0deg); }
				50% { transform: translateY(-20px) rotate(5deg); }
			}
			@keyframes pulse {
				0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(233, 69, 96, 0.5)); }
				50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(233, 69, 96, 0.8)); }
			}
			@keyframes fadeInUp {
				from {
					opacity: 0;
					transform: translateY(30px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
			@keyframes shake {
				0%, 100% { transform: translateX(0); }
				10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
				20%, 40%, 60%, 80% { transform: translateX(5px); }
			}
			@keyframes glow {
				0%, 100% { box-shadow: 0 0 5px rgba(233, 69, 96, 0.5), 0 0 10px rgba(233, 69, 96, 0.3); }
				50% { box-shadow: 0 0 20px rgba(233, 69, 96, 0.8), 0 0 30px rgba(233, 69, 96, 0.5); }
			}
			@keyframes particle {
				0% {
					opacity: 0;
					transform: translateY(100vh) scale(0);
				}
				10% { opacity: 1; }
				90% { opacity: 1; }
				100% {
					opacity: 0;
					transform: translateY(-10vh) scale(1);
				}
			}
			@keyframes spin {
				from { transform: rotate(0deg); }
				to { transform: rotate(360deg); }
			}
			body {
				padding: 0;
				margin: 0;
				font-family: "Material Icons", sans-serif;
			}
			#loginScreen {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
				background-size: 400% 400%;
				animation: gradientShift 15s ease infinite;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				z-index: 1000;
				overflow: hidden;
			}
			#particles {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				pointer-events: none;
				z-index: 1;
			}
			.particle {
				position: absolute;
				width: 4px;
				height: 4px;
				background: rgba(255, 255, 255, 0.6);
				border-radius: 50%;
				animation: particle 10s linear infinite;
			}
			#loginContainer {
				width: 400px;
				padding: 40px;
				background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
				border-radius: 20px;
				backdrop-filter: blur(20px);
				border: 1px solid rgba(255, 255, 255, 0.3);
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
				animation: fadeInUp 0.8s ease-out;
				z-index: 10;
				position: relative;
			}
			#logoContainer {
				text-align: center;
				margin-bottom: 20px;
				animation: float 3s ease-in-out infinite;
			}
			#gameLogo {
				width: 80px;
				height: 80px;
				object-fit: contain;
				filter: drop-shadow(0 0 20px rgba(233, 69, 96, 0.6));
				animation: pulse 2s ease-in-out infinite;
			}
			#loginTitle {
				font-size: 36px;
				color: white;
				text-align: center;
				margin-bottom: 10px;
				font-weight: bold;
				text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
				letter-spacing: 2px;
			}
			#loginSubtitle {
				font-size: 14px;
				color: rgba(255, 255, 255, 0.7);
				text-align: center;
				margin-bottom: 30px;
				letter-spacing: 1px;
			}
			.input-group {
				margin-bottom: 20px;
			}
			.input-label {
				font-size: 12px;
				color: rgba(255, 255, 255, 0.8);
				margin-bottom: 8px;
				display: block;
			}
			.login-input {
				width: 100%;
				height: 48px;
				padding: 0 16px;
				border: 2px solid rgba(255, 255, 255, 0.2);
				border-radius: 12px;
				background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
				color: white;
				font-size: 14px;
				box-sizing: border-box;
				transition: all 0.3s ease;
			}
			.login-input:focus {
				outline: none;
				border-color: #e94560;
				background: linear-gradient(135deg, rgba(233, 69, 96, 0.1) 0%, rgba(255, 255, 255, 0.1) 100%);
				box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
			}
			.login-input::placeholder {
				color: rgba(255, 255, 255, 0.4);
			}
			.login-input.error {
				border-color: #ff4757;
				animation: shake 0.5s ease-in-out;
				background: linear-gradient(135deg, rgba(255, 71, 87, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
			}
			#loginButton {
				width: 100%;
				height: 52px;
				margin-top: 25px;
				background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
				color: white;
				border: none;
				border-radius: 12px;
				font-size: 16px;
				font-weight: bold;
				cursor: pointer;
				transition: all 0.3s ease;
				text-transform: uppercase;
				letter-spacing: 1px;
				position: relative;
				overflow: hidden;
				box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
			}
			#loginButton:hover {
				background: linear-gradient(135deg, #ff6b6b 0%, #e94560 100%);
				transform: translateY(-2px);
				box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
			}
			#loginButton:active {
				transform: translateY(0);
			}
			#loginButton.loading {
				pointer-events: none;
				background: linear-gradient(135deg, #666 0%, #444 100%);
			}
			#loginButton.loading::after {
				content: "";
				position: absolute;
				width: 20px;
				height: 20px;
				top: 50%;
				left: 50%;
				margin-left: -10px;
				margin-top: -10px;
				border: 2px solid rgba(255, 255, 255, 0.3);
				border-top-color: white;
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
			}
			#statusMessage {
				margin-top: 15px;
				font-size: 13px;
				color: #ff6b6b;
				text-align: center;
				min-height: 18px;
				font-weight: 500;
				transition: all 0.3s ease;
			}
			#statusMessage.success {
				color: #2ecc71;
			}
			#versionInfo {
				position: absolute;
				bottom: 20px;
				font-size: 12px;
				color: rgba(255, 255, 255, 0.5);
				z-index: 10;
				letter-spacing: 0.5px;
			}
			.corner-decoration {
				position: absolute;
				width: 60px;
				height: 60px;
				border: 2px solid rgba(233, 69, 96, 0.3);
				z-index: 5;
			}
			.corner-decoration.top-left {
				top: 20px;
				left: 20px;
				border-right: none;
				border-bottom: none;
				border-radius: 10px 0 0 0;
			}
			.corner-decoration.top-right {
				top: 20px;
				right: 20px;
				border-left: none;
				border-bottom: none;
				border-radius: 0 10px 0 0;
			}
			.corner-decoration.bottom-left {
				bottom: 20px;
				left: 20px;
				border-right: none;
				border-top: none;
				border-radius: 0 0 0 10px;
			}
			.corner-decoration.bottom-right {
				bottom: 20px;
				right: 20px;
				border-left: none;
				border-top: none;
				border-radius: 0 0 10px 0;
			}
		</style>
	</head>
	<body>
		<div id="loginScreen">
			<div class="corner-decoration top-left"></div>
			<div class="corner-decoration top-right"></div>
			<div class="corner-decoration bottom-left"></div>
			<div class="corner-decoration bottom-right"></div>
			
			<div id="particles"></div>
			
			<div id="loginContainer">
				<div id="logoContainer">
					<img id="gameLogo" src="textures/kiaju-icon.png" alt="TesselBox Logo" />
				</div>
				<div id="loginTitle">TesselBox</div>
				<div id="loginSubtitle">3D Voxel Adventure</div>
				
				<div class="input-group">
					<label class="input-label">Username</label>
					<input id="usernameInput" class="login-input" type="text" placeholder="Enter your username" />
				</div>
				
				<div class="input-group">
					<label class="input-label">Password</label>
					<input id="passwordInput" class="login-input" type="password" placeholder="Enter your password" />
				</div>
				
				<button id="loginButton">Login</button>
				
				<div id="statusMessage"></div>
			</div>
			
			<div id="versionInfo">v1.0.0 - Kaiju Engine</div>
		</div>
	</body>
</html>
